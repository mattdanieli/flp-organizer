name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name FLPOrganizer `
            --icon docs/icon.ico `
            --add-data "docs/icon.ico;docs" `
            --add-data "docs/icon_32.png;docs" `
            --add-data "docs/icon_64.png;docs" `
            --hidden-import tkinterdnd2 `
            --paths src src/flp_gui.py

      - name: Determine version string
        id: version
        shell: pwsh
        run: |
          # Extract version number from tag (e.g. "v1.5.0" -> "1.5.0").
          # If running outside a tag (workflow_dispatch), use "dev".
          $ref = "${{ github.ref }}"
          if ($ref -like "refs/tags/v*") {
            $version = $ref -replace "refs/tags/v", ""
          } else {
            $version = "dev"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "Version detected: $version"

      - name: Rename executable with version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          Copy-Item "dist/FLPOrganizer.exe" "dist/FLPOrganizer-$version.exe"

      - name: Build release zip
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $stagingDir = "release-staging"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          # Copy items into the staging folder
          Copy-Item "dist/FLPOrganizer-$version.exe" "$stagingDir/"
          Copy-Item "README.md" "$stagingDir/" -ErrorAction SilentlyContinue
          Copy-Item "LICENSE" "$stagingDir/" -ErrorAction SilentlyContinue
          Copy-Item "CHANGELOG.md" "$stagingDir/" -ErrorAction SilentlyContinue
          # Compress
          $zipName = "FLPOrganizer-$version-windows.zip"
          Compress-Archive -Path "$stagingDir/*" -DestinationPath "dist/$zipName" -Force
          echo "Created: dist/$zipName"

      - name: Upload artifact (CI / non-tag runs)
        uses: actions/upload-artifact@v4
        with:
          name: FLPOrganizer-windows
          path: |
            dist/FLPOrganizer-*.exe
            dist/FLPOrganizer-*-windows.zip

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/FLPOrganizer-*.exe
            dist/FLPOrganizer-*-windows.zip
          generate_release_notes: true
